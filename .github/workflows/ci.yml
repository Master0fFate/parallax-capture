name: ci

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-test-package:
    name: ${{ matrix.os }} ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            package_command: pwsh ./scripts/package-windows.ps1 -RuntimeIdentifier win-x64
            test_command: dotnet test ParallaxCapture.sln -c Release --no-build --logger "console;verbosity=minimal"
          - os: macos-13
            rid: osx-x64
            package_command: bash ./scripts/package-macos.sh osx-x64
            test_command: dotnet test tests/Parallax.Packaging.Tests/Parallax.Packaging.Tests.csproj -c Release --no-build --logger "console;verbosity=minimal"
          - os: macos-latest
            rid: osx-arm64
            package_command: bash ./scripts/package-macos.sh osx-arm64
            test_command: dotnet test tests/Parallax.Packaging.Tests/Parallax.Packaging.Tests.csproj -c Release --no-build --logger "console;verbosity=minimal"
          - os: ubuntu-latest
            rid: linux-x64
            package_command: bash ./scripts/package-linux.sh linux-x64
            test_command: dotnet test tests/Parallax.Packaging.Tests/Parallax.Packaging.Tests.csproj -c Release --no-build --logger "console;verbosity=minimal"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore Windows solution
        if: runner.os == 'Windows'
        run: dotnet restore ParallaxCapture.sln

      - name: Restore cross-platform projects
        if: runner.os != 'Windows'
        run: |
          dotnet restore src/Parallax.App.Avalonia/Parallax.App.Avalonia.csproj
          dotnet restore tests/Parallax.Packaging.Tests/Parallax.Packaging.Tests.csproj

      - name: Build cross-platform app
        run: dotnet build src/Parallax.App.Avalonia/Parallax.App.Avalonia.csproj -c Release --no-restore

      - name: Build full Windows solution
        if: runner.os == 'Windows'
        run: dotnet build ParallaxCapture.sln -c Release --no-restore

      - name: Build packaging tests
        if: runner.os != 'Windows'
        run: dotnet build tests/Parallax.Packaging.Tests/Parallax.Packaging.Tests.csproj -c Release --no-restore

      - name: Test
        run: ${{ matrix.test_command }}

      - name: Publish target RID
        run: dotnet publish src/Parallax.App.Avalonia/Parallax.App.Avalonia.csproj -c Release -r ${{ matrix.rid }} --self-contained false -p:PublishSingleFile=false -p:PublishReadyToRun=false -o artifacts/publish/${{ matrix.rid }}

      - name: Package smoke
        run: ${{ matrix.package_command }}

      - name: Verify checksum manifest
        shell: pwsh
        run: |
          if (-not (Test-Path artifacts/release/SHA256SUMS)) {
            throw "SHA256SUMS was not generated."
          }
          Get-Content artifacts/release/SHA256SUMS

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parallax-capture-${{ matrix.rid }}
          path: |
            artifacts/release/*
