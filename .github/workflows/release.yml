name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: macos-13
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_BUILD: true
      RELEASE_VERSION: ${{ github.ref_name }}
      RID: ${{ matrix.rid }}
      MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
      MACOS_NOTARY_PROFILE: ${{ secrets.MACOS_NOTARY_PROFILE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore package project
        run: dotnet restore src/Parallax.App.Avalonia/Parallax.App.Avalonia.csproj

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package-windows.ps1 -RuntimeIdentifier $env:RID -Version $env:RELEASE_VERSION

      - name: Package macOS
        if: runner.os == 'macOS'
        shell: bash
        run: VERSION="$RELEASE_VERSION" bash ./scripts/package-macos.sh "$RID"

      - name: Package Linux
        if: runner.os == 'Linux'
        shell: bash
        run: VERSION="$RELEASE_VERSION" bash ./scripts/package-linux.sh "$RID"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: artifacts/release/*

  publish-github-release:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          fail_on_unmatched_files: true
