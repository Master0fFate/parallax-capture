name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            command: pwsh ./scripts/package-windows.ps1 -RuntimeIdentifier win-x64 -Version ${{ github.ref_name }}
          - os: macos-13
            rid: osx-x64
            command: bash ./scripts/package-macos.sh osx-x64
          - os: macos-latest
            rid: osx-arm64
            command: bash ./scripts/package-macos.sh osx-arm64
          - os: ubuntu-latest
            rid: linux-x64
            command: bash ./scripts/package-linux.sh linux-x64
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ github.ref_name }}
      MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
      MACOS_NOTARY_PROFILE: ${{ secrets.MACOS_NOTARY_PROFILE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore package project
        run: dotnet restore src/Parallax.App.Avalonia/Parallax.App.Avalonia.csproj

      - name: Package
        run: ${{ matrix.command }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: artifacts/release/*

  publish-github-release:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          fail_on_unmatched_files: true
